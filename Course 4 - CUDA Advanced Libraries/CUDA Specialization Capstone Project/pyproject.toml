[project]
name = "capstone-project-gpu-specialization"
version = "0.1.0"
description = "Space Capstone Project for GPU Specialization"
readme = "README.md"
requires-python = ">=3.8"
dependencies = [
    "pandas",
    "tensorflow-gpu"
]

[dependency-groups]
dev = [
    "pre-commit",
    "pytest",
]

[tool.pytest.ini_options]
pythonpath = [
  "."
]

[tool.setuptools]
packages = ["capstone-project-gpu-specialization"]